<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error - HealthApp</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f8d7da; color: #721c24; }
        .error-container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; display: inline-block; }
    </style>
</head>
<body>
<div class="error-container">
    <h1>¡Ups! Algo ha salido mal</h1>
    <p>Ha ocurrido un problema al procesar tu solicitud:</p>

    <h3 th:text="${mensajeError}">Error desconocido</h3>

    <br>
    <a th:href="@{/login}" class="btn">Volver al Inicio</a>
</div>
</body>
</html>
