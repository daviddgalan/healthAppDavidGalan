<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - HealthApp</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 5px; }
        .alert-danger { background-color: #f8d7da; color: #721c24; }
        .alert-success { background-color: #d4edda; color: #155724; }
        .alert-info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>

<div class="container">
    <h2>Acceso a HealthApp</h2>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <div th:if="${param.registroExitoso}" class="alert alert-success">
        Registro completado. Ya puedes iniciar sesión.
    </div>

    <div th:if="${param.logout}" class="alert alert-info">
        Has cerrado sesión correctamente.
    </div>

    <form th:action="@{/login}" th:object="${loginDTO}" method="post">
        <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" th:field="*{email}" required autofocus />
        </div>

        <div class="form-group">
            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" th:field="*{contrasena}" required />
        </div>

        <button type="submit" class="btn">Entrar</button>
    </form>

    <p style="text-align: center; margin-top: 15px;">
        ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
    </p>
</div>

</body>
</html>
